<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Weather App</title>
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <link rel="apple-touch-icon" href="images/apple-touch-icon-iphone-60x60.png">
    <link rel="apple-touch-icon" sizes="60x60" href="images/apple-touch-icon-ipad-76x76.png">
    <link rel="apple-touch-icon" sizes="114x114" href="images/apple-touch-icon-iphone-retina-120x120.png">
    <link rel="apple-touch-icon" sizes="144x144" href="images/apple-touch-icon-ipad-retina-152x152.png">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.8/dist/cyborg/bootstrap.min.css" integrity="sha384-H4X+4tKc7b8s4GoMrylmy2ssQYpDHoqzPa9aKXbDwPoPUA3Ra8PA5dGzijN+ePnH" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.3.0/font/bootstrap-icons.css">
</head>
<body class="bg-dark">
    <div class="col-12 d-flex justify-content-center align-items-center min-vh-100">
    <div class="card col-11 col-md-8 col-lg-5">
    <div class="card-body p-4">
    <h2 class="text-center text-primary mb-4">Current Weather</h2>
    
    <div class="row text-center align-items-center">
        <div class="col-sm-6 border-right">
            <i class="bi bi-geo-alt display-4 text-danger"></i>
            <h3 class="mt-2">Cookeville</h3>
        </div>

        <div class="col-sm-6 mt-4 mt-sm-0">
            <i id="wIcon" class="bi bi-cloud display-1 text-info"></i>
            <h4 id="wDesc" class="mt-2 text-muted">Loading...</h4>
            <hr>
            
            <div class="d-flex justify-content-around mt-3">
                <div><i class="bi bi-thermometer-half text-warning" style="font-size: 1.5rem;"></i> <span id="temp" class="h4">--°</span></div>
                <div><i class="bi bi-droplet text-primary" style="font-size: 1.5rem;"></i> <span id="hum" class="h4">--%</span></div>
            </div>
            
            <div class="d-flex justify-content-around mt-2">
                <div><small class="text-muted">Feels like: <span id="feelsLike">--°</span></small></div>
                <div><small class="text-muted">Wind: <span id="wind">-- mph</span></small></div>
            </div>
        </div>
    </div>
    
    <div class="text-center mt-4">
        <small class="text-muted">Data courtesy of <a href="https://open-meteo.com/" target="_blank">Open-Meteo</a></small>
    </div>
    </div>
    </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

<script>
// added apparent temp and wind speed to the api call
const api = "https://api.open-meteo.com/v1/forecast?latitude=36.1628&longitude=-85.5016&current=temperature_2m,relative_humidity_2m,weather_code,apparent_temperature,wind_speed_10m&temperature_unit=fahrenheit&wind_speed_unit=mph"

fetch(api)
.then(r => r.json())
.then(d => {
    // map vars
    let t = d.current.temperature_2m
    let h = d.current.relative_humidity_2m
    let c = d.current.weather_code
    let feels = d.current.apparent_temperature
    let w = d.current.wind_speed_10m

    let i = "bi-question-circle"
    let txt = "Unknown"

    // check weather code
    if(c === 0){ i="bi-brightness-high text-warning"; txt="Clear Sky"; }
    else if(c>0 && c<=3){ i="bi-clouds text-secondary"; txt="Cloudy"; }
    else if(c>=45 && c<=48){ i="bi-cloud-haze text-secondary"; txt="Foggy"; }
    else if(c>=51 && c<=67){ i="bi-cloud-rain text-primary"; txt="Rain"; }
    else if(c>=71 && c<=77){ i="bi-snow text-info"; txt="Snow"; }
    else if(c>=95){ i="bi-lightning text-danger"; txt="Storms"; }

    // push to dom
    document.querySelector('#temp').innerText = Math.round(t) + "°"
    document.querySelector('#hum').innerText = h + "%"
    document.querySelector('#wDesc').innerText = txt
    document.querySelector('#wIcon').className = "bi " + i + " display-1"
    
    // push new elements to dom
    document.querySelector('#feelsLike').innerText = Math.round(feels) + "°"
    document.querySelector('#wind').innerText = Math.round(w) + " mph"
})
.catch(err => {
    // bad api catch
    Swal.fire({
        icon: 'error',
        title: 'Oops...',
        text: 'Failed to pull weather data from Open-Meteo'
    })
    console.log(err)
})
</script>

</body>
</html>
