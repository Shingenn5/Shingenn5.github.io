<!DOCTYPE html>
<html lang="en">
<head>
    // 
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <title>Weather App</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/zephyr/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <link rel="apple-touch-icon" href="images/apple-touch-icon-iphone60x60.png">
    <link rel="apple-touch-icon" sizes="60x60" href="images/apple-touchicon-ipad-76x76.png">
    <link rel="apple-touch-icon" sizes="114x114" href="images/apple-touchicon-iphone-retina-120x120.png">
    <link rel="apple-touch-icon" sizes="144x144" href="images/apple-touchicon-ipad-retina-152x152.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrapicons@1.11.3/font/bootstrap-icons.css">

    <link rel="manifest" href="manifest.json">

</head>
<body class="bg-primary-subtle">
<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-lg border-0 rounded-4 overflow-hidden" style="max-width: 450px; width: 100%;">
        
        <div class="card-header bg-primary text-white p-4 border-0">
            <div class="d-flex justify-content-between align-items-center">
                <h3 class="mb-0 fw-bold"><i class="bi bi-geo-alt-fill me-2"></i>Cookeville</h3>
                <span class="badge bg-white text-primary rounded-pill fw-bold px-3 py-2">TODAY</span>
            </div>
        </div>

        <div class="card-body bg-white p-4 p-sm-5 text-center">
            <div class="my-3">
                <i id="wIcon" class="bi bi-cloud-sun text-primary" style="font-size: 7rem;"></i>
                <h1 id="temp" class="display-1 fw-bolder text-dark mt-2 mb-0">--°</h1>
                <h5 id="wDesc" class="text-muted fw-bold text-uppercase tracking-wider">Fetching</h5>
            </div>

            <div class="row g-2 mt-5">
                <div class="col-4">
                    <div class="p-2 border rounded-3 bg-light h-100">
                        <i class="bi bi-droplet-half text-info fs-4"></i>
                        <h6 id="hum" class="mb-0 mt-1 fw-bold text-dark">--%</h6>
                        <small class="text-dark fw-semibold" style="font-size: 0.6rem;">HUMIDITY</small>
                    </div>
                </div>

                <div class="col-4">
                    <div class="p-2 border rounded-3 bg-light h-100">
                        <i class="bi bi-wind text-dark fs-4"></i>
                        <h6 id="wind" class="mb-0 mt-1 fw-bold text-dark">--</h6>
                        <small class="text-dark fw-semibold" style="font-size: 0.6rem;">WIND MPH</small>
                    </div>
                </div>

                <div class="col-4">
                    <div class="p-2 border rounded-3 bg-light h-100">
                        <i class="bi bi-thermometer-sun text-warning fs-4"></i>
                        <h6 id="feelsLike" class="mb-0 mt-1 fw-bold text-dark">--°</h6>
                        <small class="text-dark fw-semibold" style="font-size: 0.6rem;">FEELS LIKE</small>
                    </div>
                </div>
            </div>

            <div class="mt-5">
                <small class="text-dark small">Data by <a href="https://open-meteo.com/" target="_blank" class="text-primary text-decoration-none fw-bold">Open-Meteo</a></small>
            </div>
        </div>
    </div>
</div>

<div id="forecast" class="container mt-5">
    <h2 class="text-center mb-4">7-Day Forecast</h2>
    <div class="row row-cols-1 row-cols-md-3 g-4"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
// gets the spot
function getLocation() {
  const lat = 36.1628;
  const lon = -85.5016;
  const apiCurrent = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`;
  const apiForecast = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min&timezone=America%2FChicago`;

  Swal.fire({
    title: 'Loading...',
    html: 'Fetching weather data...',
    allowOutsideClick: false,
    didOpen: () => {
      Swal.showLoading();
    }
  });

  Promise.all([fetch(apiCurrent), fetch(apiForecast)])
    .then(responses => Promise.all(responses.map(r => r.json())))
    .then(data => {
      const [currentData, forecastData] = data;
      // get current weather data
      let t = currentData.current_weather.temperature;
      let icon = "bi-question-circle";
      let txt = "Unknown";

      // check weather codes
      if (currentData.current_weather.weathercode == 0) {
        icon = "bi-sun-fill text-warning";
        txt = "Clear Sky";
      } else if (currentData.current_weather.weathercode < 10) {
        icon = "bi-cloud-sun-fill text-primary";
        txt = "Partly Cloudy";
      } else if (currentData.current_weather.weathercode < 50) {
        icon = "bi-cloud-haze2-fill text-secondary";
        txt = "Foggy";
      } else if (currentData.current_weather.weathercode < 70) {
        icon = "bi-cloud-rain-heavy-fill text-info";
        txt = "Raining";
      } else if (currentData.current_weather.weathercode < 80) {
        icon = "bi-snow text-primary";
        txt = "Snowing";
      } else {
        icon = "bi-cloud-lightning-fill text-danger";
        txt = "Storming";
      }

      // update html
      document.querySelector('#temp').innerText = Math.round(t) + "°";
      document.querySelector('#wDesc').innerText = txt;
      document.querySelector('#wIcon').className = "bi " + icon;
      document.querySelector('#hum').innerText = currentData.current_weather.humidity + "%";
      document.querySelector('#wind').innerText = currentData.current_weather.windspeed + " mph";
      document.querySelector('#feelsLike').innerText = Math.round(currentData.current_weather.feels_like_temperature) + "°";

      // get forecast data
      const days = forecastData.daily.time.slice(0, 7);
      const maxTemps = forecastData.daily.temperature_2m_max.slice(0, 7);
      const minTemps = forecastData.daily.temperature_2m_min.slice(0, 7);

      const forecastContainer = document.querySelector('#forecast .row');
      days.forEach((day, index) => {
        const card = document.createElement('div');
        card.className = 'col';
        card.innerHTML = `
          <div class="card shadow-sm">
            <div class="card-body text-center">
              <h5 class="card-title">${new Date(day).toLocaleDateString()}</h5>
              <p class="card-text"><i class="bi bi-thermometer-sun"></i> High: ${Math.round(maxTemps[index])}°</p>
              <p class="card-text"><i class="bi bi-thermometer-snow"></i> Low: ${Math.round(minTemps[index])}°</p>
            </div>
          </div>
        `;
        forecastContainer.appendChild(card);
      });

      Swal.close();
    })
    .catch(function(bad) {
      // API error
      Swal.fire({
        icon: 'error',
        title: 'API Error',
        text: 'Couldnt get the weather data'
      });
      console.log(bad);
    });
}

// fire automatically via window.onload
window.onload = getLocation;
</script>

</body>
</html>
