<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Weather App</title>
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <link rel="apple-touch-icon" href="images/apple-touch-icon-iphone-60x60.png">
    <link rel="apple-touch-icon" sizes="60x60" href="images/apple-touch-icon-ipad-76x76.png">
    <link rel="apple-touch-icon" sizes="114x114" href="images/apple-touch-icon-iphone-retina-120x120.png">
    <link rel="apple-touch-icon" sizes="144x144" href="images/apple-touch-icon-ipad-retina-152x152.png">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/cyborg/bootstrap.min.css" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body class="bg-black">
    <div class="d-flex justify-content-center align-items-center min-vh-100 px-3">
    <div class="card bg-dark border-secondary rounded-4 shadow-lg w-100" style="max-width: 450px;">
    <div class="card-body p-4 p-md-5 text-center">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="mb-0 fw-bold text-light"><i class="bi bi-geo-alt-fill text-danger me-2"></i>Cookeville</h5>
            <span class="badge bg-primary rounded-pill px-3 py-2 shadow-sm">LIVE</span>
        </div>

        <div class="my-5">
            <i id="wIcon" class="bi bi-cloud text-secondary" style="font-size: 6rem;"></i>
            <h1 id="temp" class="display-1 fw-bolder text-white mt-3 mb-0">--°</h1>
            <h6 id="wDesc" class="fw-light mt-2 text-uppercase text-muted">Loading...</h6>
        </div>

        <div class="row g-2 mt-4">
            <div class="col-4">
            <div class="p-3 bg-black rounded-4 border border-dark h-100 d-flex flex-column justify-content-center">
                <i class="bi bi-droplet-fill text-info mb-2 fs-4"></i>
                <h5 id="hum" class="mb-0 fw-bold">--%</h5>
                <small class="text-muted" style="font-size: 0.65rem; letter-spacing: 1px;">HUMIDITY</small>
            </div>
            </div>
            
            <div class="col-4">
            <div class="p-3 bg-black rounded-4 border border-dark h-100 d-flex flex-column justify-content-center">
                <i class="bi bi-wind text-secondary mb-2 fs-4"></i>
                <h5 id="wind" class="mb-0 fw-bold">--</h5>
                <small class="text-muted" style="font-size: 0.65rem; letter-spacing: 1px;">WIND MPH</small>
            </div>
            </div>
            
            <div class="col-4">
            <div class="p-3 bg-black rounded-4 border border-dark h-100 d-flex flex-column justify-content-center">
                <i class="bi bi-thermometer-sun text-warning mb-2 fs-4"></i>
                <h5 id="feelsLike" class="mb-0 fw-bold">--°</h5>
                <small class="text-muted" style="font-size: 0.65rem; letter-spacing: 1px;">FEELS LIKE</small>
            </div>
            </div>
        </div>

    </div>
    
    <div class="card-footer border-0 bg-transparent text-center pb-4">
        <small class="text-muted">Data courtesy of <a href="https://open-meteo.com/" target="_blank" class="text-primary text-decoration-none">Open-Meteo</a></small>
    </div>
    </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
// open meteo fetch
const api = "https://api.open-meteo.com/v1/forecast?latitude=36.1628&longitude=-85.5016&current=temperature_2m,relative_humidity_2m,weather_code,apparent_temperature,wind_speed_10m&temperature_unit=fahrenheit&wind_speed_unit=mph"

fetch(api)
.then(r => r.json())
.then(d => {
    let t = d.current.temperature_2m
    let h = d.current.relative_humidity_2m
    let c = d.current.weather_code
    let feels = d.current.apparent_temperature
    let w = d.current.wind_speed_10m

    let i = "bi-question-circle"
    let txt = "Unknown"

    if(c === 0){ i="bi-sun-fill text-warning"; txt="Clear Sky"; }
    else if(c>0 && c<=3){ i="bi-clouds-fill text-light"; txt="Cloudy"; }
    else if(c>=45 && c<=48){ i="bi-cloud-haze text-secondary"; txt="Foggy"; }
    else if(c>=51 && c<=67){ i="bi-cloud-rain-fill text-info"; txt="Rain"; }
    else if(c>=71 && c<=77){ i="bi-snow text-white"; txt="Snow"; }
    else if(c>=95){ i="bi-cloud-lightning-rain-fill text-danger"; txt="Storms"; }

    document.querySelector('#temp').innerText = Math.round(t) + "°"
    document.querySelector('#hum').innerText = h + "%"
    document.querySelector('#wDesc').innerText = txt
    document.querySelector('#wIcon').className = "bi " + i
    document.querySelector('#feelsLike').innerText = Math.round(feels) + "°"
    document.querySelector('#wind').innerText = Math.round(w)
})
.catch(err => {
    Swal.fire({
        icon: 'error',
        title: 'Oops...',
        text: 'Failed to pull weather data from Open-Meteo',
        background: '#222',
        color: '#fff'
    })
    console.log(err)
})
</script>

</body>
</html>
